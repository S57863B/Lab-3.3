<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
<style>
  body {
    background-color: hsl(47, 88%, 63%);
    margin: 0;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .blog-preview-card {
    max-width: 350px;
    width: 90%;
    padding: 24px;
    border-radius: 20px;
    background-color: #fff;
    border: 1px solid #111;
    box-shadow: 8px 8px 0px 0px #000;
  }

  .blog-preview-card img.main-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 24px;
  }


  #Learning {
    background-color: hsl(47, 88%, 63%);
    display: inline-block;
    padding: 4px 12px;
    border-radius: 4px;
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 12px;
  }

  .publish-date {
    font-size: 16px;
    margin-bottom: 12px;
  }

  .blog-content {
    text-align: left;
  }

  .blog-content h1 {
    font-size: 24px;
    margin: 12px 0;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .blog-content h1:hover {
    color: hsl(47, 88%, 63%);
  }

  .blog-content p {
    color: hsl(0, 0%, 42%);
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .author-info {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
  }

  .author-info img {
    width: 32px;
    height: 32px;
  }
</style>
</head>
<body>
<div class="blog-preview-card">
  <img src="./assets/images/illustration-article.svg" alt="Blog preview image" class="main-img">
  <div class="blog-content">
    <span id="Learning">Learning</span>
    <p class="publish-date">Published 21 Dec 2023</p>
    <h1>HTML & CSS foundations</h1>
    <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
    <div class="author-info">
      <img src="./assets/images/image-avatar.webp" alt="Author's avatar">
      <span>Greg Hooper</span>
    </div>
  </div>
</div>
</body>
</html>
