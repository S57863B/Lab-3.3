<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Preview Card - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-yellow d-flex align-items-center justify-content-center vh-100">
  <div class="card custom-shadow p-3" style="max-width: 380px; border-radius: 20px; border: 1px solid #000;">
    <img src="./assets/images/illustration-article.svg" class="rounded-3 mb-3" alt="Article Illustration">
    <div class="card-body p-0">
      <span class="badge bg-yellow text-dark fw-bold px-3 py-2 mb-3">Learning</span>
      <p class="small mb-2 text-dark">Published 21 Dec 2023</p>
      <h2 class="h4 fw-bolder mb-3 card-hover-title">HTML & CSS foundations</h2>
      <p class="text-muted mb-4">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
      <div class="d-flex align-items-center gap-2">
        <img src="./assets/images/image-avatar.webp" width="32" height="32" alt="Avatar">
        <span class="fw-bold">Greg Hooper</span>
      </div>
    </div>
  </div>
</body>
</html>
